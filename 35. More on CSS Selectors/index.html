       .boxes::before{
        content: "Tarun Saini";
        color: blue;
       } 

       .boxes::after{
        content: "Sigma course is also good";
        color: red;
       }

       ::selection{
        background-color: black;
        color: aqua;
       }

       .box::first-letter{
        color: rgb(61, 16, 103);
        color: peru;
        font-size: 45px;
       }

       input::placeholder{
        color: blue;
       }
    </style>
</head>
<body>
    <div class="boxes">
    <div data-color="primary" class="box">I am an first Box</div>
    <div class="box">Hey I am a Box</div>
    <div class="box">Hey I am a Box</div>
    <input type="text" placeholder="Type your name">
</body>
