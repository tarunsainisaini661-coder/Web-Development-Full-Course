<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Website Layout</title>
    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

    </style>
</head>
<body>

    <!-- Main Container -->
    <div class="container">
        
        <header>
            <h1>My Website</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
            </nav>
        </header>

        <div class="layout-wrapper">
            <main>
                <h2>Main Content Area</h2>
                <p>Your primary content goes here.</p>
            </main>

            <aside>
                <h3>Sidebar</h3>
                <p>Links or extra info.</p>
            </aside>
        </div>

        <footer>
            <p>&copy; 2026 My Website</p>
        </footer>

    </div>

</body>
</html>
