<!DOCTYPE html>
<html>

<head>
    <title>Card Design</title>
    <style>
        body {
            background-color: grey;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: springgreen;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 300px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card h2 {
            margin: 15px 0 5px;
        }

        .card p {
            color: rgb(102, 102, 102);
            margin-bottom: 15px;
        }

        .card button {
            margin-bottom: 20px;
            padding: 10px 20px;
            border: none;
            background: rgb(0, 123, 255);
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="tarun.png" alt="My Image">

        <h2>Tarun Saini</h2>

        <p>Frontend Developer</p>

        <button>Contact Me: 6737846870</button>
    </div>

</body>

</html>
