<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
            padding: 45px;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 344px;
            border-radius: 7px;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .content {
            padding: 7px 13px;
font-family: 'Poppins', sans-serif;
        }

        .content p {
            font-size: 9px;
            color: gray;
        }

        .capsules {
            padding: 0 28px 0 14px;
        }

        .capsules span {
            border: 1px solid gray;
            padding: 0px 6px;
            border-radius: 7px;
            font-size: 8px;
            font-family: 'Baloo Bhai 2', sans-serif;
        }
    </style>
</head>

<body>
    <div class="Card">

        <div class="image">
            <img width="188"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQp7MPOved3-RsNnZJ4DPWxwxMttmLo1VtS4Q&s"
                alt="">
        </div>

        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Tarun Saini</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Minima voluptate culpa eius voluptatibus magni
                consectetur hic, ullam quae, perferendis et, qui deserunt maiores.</p>
        </div>
    </div>
</body>

</html>
