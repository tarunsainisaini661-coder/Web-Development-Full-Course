<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Lists</title>
    <style>
      nav u1 li {
        list-style: devanagari;
        background-color: yellow;
        list-style-position: inside;
        border: 2px solid black;
        list-style-type: disc;
        list-style-image: url(https://www.shutterstock.com/image-vector/snowboarding-penguin-coloring-page-illustration-2643752531?trackingId=479421ff-b411-48e1-9a23-904233535679&listId=searchResults);
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
    </nav>
  </body>
</html>
